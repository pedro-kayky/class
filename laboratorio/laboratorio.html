<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錬金術アカデミー - 講義録</title>
    <link rel="stylesheet" href="laboratorio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- AJUSTADO: ../audio/ para sair de laboratorio/ e acessar audio/ -->
    <audio id="bgMusic" loop>
        <source src="../audio/coco-begins-his-journey.mp3" type="audio/mpeg">
    </audio>

    <div id="cursor"></div>

    <div class="container-lab">
        <aside class="sidebar-alquimista">
            <div class="avatar-moldura">🔮</div>
            <h2>見習い錬金術師</h2>
            <p class="patente">Rank: Apprentice</p>
            
            <div class="progresso-sidebar">
                <div class="texto-progresso">
                    <span>全体達成度</span>
                    <span>0%</span>
                </div>
                <div class="barra-trilho">
                    <div class="barra-preenchimento" style="width: 0%;"></div>
                </div>
            </div>

            <div class="login-box">
                <span class="status-badge">ONLINE</span>
            </div>
        </aside>

        <!-- AJUSTADO: ../audio/ removendo a barra inicial -->
        <audio id="clickSound">
            <source src="../audio/typing.mp3" type="audio/mpeg">
        </audio>
        <audio id="hoverSound">
            <source src="../audio/lesiakower-minimalist-button-hover-sound-effect-399749.mp3" type="audio/mpeg">
        </audio>

        <main class="painel-aulas">
            <header class="header-painel">
                <h1>📜 選択された授業</h1>
                <p>日常の錬成。講義を選択して、現実世界の錬金術を始めましょう。</p>
            </header>

            <div class="grade-aulas">
                <div class="card-aula ativa" data-aula="1">
                    <div class="capa-container">
                        <!-- AJUSTADO: ../imgs/ -->
                        <img src="../imgs/image.png" alt="ポーションの基礎" class="capa-aula">
                        <div class="overlay-info">
                            <h3>01. カクテルの基礎</h3>
                            <p>味覚と成分を操る現代の液体錬成術（ミクソロジー）。</p>
                        </div>
                    </div>
                </div>

                <div class="card-aula trancada">
                    <div class="capa-container">
                        <div class="cadeado-roxo">🔮</div> 
                        <!-- AJUSTADO: ../imgs/ -->
                        <img src="../imgs/images (1).jpg" alt="家庭薬の調製" class="capa-aula">
                        <div class="overlay-info">
                            <h3>02. 自然の調薬</h3>
                            <p>薬草や植物の抽出物から作る、自家製の天然治癒薬。</p>
                        </div>
                    </div>
                </div>

                <div class="card-aula trancada">
                    <div class="capa-container">
                        <div class="cadeado-roxo">🔮</div>
                        <!-- AJUSTADO: ../imgs/ -->
                        <img src="../imgs/images.jpg" alt="秘薬の錬成" class="capa-aula">
                        <div class="overlay-info">
                            <h3>03. エリクサーの真真</h3>
                            <p>心身を覚醒させる発酵とハーブの融合レシピ。</p>
                        </div>
                    </div>
                </div>

                <div class="card-aula trancada">
                    <div class="capa-container">
                        <div class="cadeado-roxo">🔮</div>
                        <!-- AJUSTADO: ../imgs/ -->
                        <img src="../imgs/image1.png" alt="菌類の調教" class="capa-aula">
                        <div class="overlay-info">
                            <h3>03. 菌類の調教</h3>
                            <p>目に見えない生命（発酵）を宿し、物質を激変させる技術。</p>
                        </div>
                    </div>
                </div>

                <!-- AULA 4: TRANCADA -->
                <div class="card-aula trancada">
                    <div class="capa-container">
                        <div class="cadeado-roxo">🔮</div>
                        <!-- AJUSTADO: ../imgs/ -->
                        <img src="../imgs/image2.png" alt="香気と記憶" class="capa-aula">
                        <div class="overlay-info">
                            <h3>04. 香気と記憶</h3>
                            <p>植物の魂（エッセンス）を抽出し、精神を宿す調香術。</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="laboratorio.js"></script>
</body>
</html>
